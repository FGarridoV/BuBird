paths:

  camera_raw:
    source: rtsp://192.168.1.61:554/mjpeg
    rtspTransport: tcp

    runOnReady: >
      ffmpeg -loglevel error -use_wallclock_as_timestamps 1 -rtsp_transport tcp 
      -i rtsp://localhost:8554/camera_raw 
      -vf "fps=15,drawtext=text='%{localtime\:%F %T}':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:fontcolor=white:fontsize=24:box=1:boxcolor=black@0.5:x=w-tw-10:y=h-th-10,format=yuv420p" 
      -c:v libx264 -preset ultrafast -tune zerolatency -f rtsp rtsp://localhost:8554/bird_house
    
    runOnReadyRestart: yes

  bird_house:
    source: publisher


